{% extends 'base.html' %}
{% block title %}{{ accion }} Incidencia{% endblock %}
{% block content %}
<h4 class="mb-3">{{ accion }} Incidencia</h4>
<div class="card" style="max-width: 600px;">
  <div class="card-body">
    <form method="post" novalidate>
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-danger">Guardar</button>
      <a href="{% url 'estaciones:lista_incidencias' %}" class="btn btn-outline-secondary ms-2">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
