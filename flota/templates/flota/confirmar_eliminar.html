{% extends 'base.html' %}

{% block title %}Eliminar{% endblock %}

{% block content %}
<div class="card" style="max-width: 480px;">
  <div class="card-body">
    <h5>Confirmar eliminacion</h5>
    <p>¿Seguro que deseas eliminar <strong>{{ objeto }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Si, eliminar</button>
      <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
